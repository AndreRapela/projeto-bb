<section id="page-form">
  <h2 class="mt-0 text-2xl font-bold mb-4">{{ cliente() ? 'Editar Cliente' : 'Novo Cliente' }}</h2>

  <div class="mb-3">
    <label class="block font-bold mb-1">Nome</label>
    <input type="text" [(ngModel)]="novoCliente.nome" placeholder="Digite o nome" 
           class="w-full p-2 border border-gray-300 rounded box-border focus:ring-2 focus:ring-blue-500 focus:outline-none transition-shadow" />
  </div>

  <div class="mb-3">
    <label class="block font-bold mb-1">CPF</label>
    <input type="text" [(ngModel)]="novoCliente.cpf" (ngModelChange)="aplicarMascaraCpf($event)" placeholder="000.000.000-00" 
           inputmode="numeric" maxlength="14"
           class="w-full p-2 border border-gray-300 rounded box-border focus:ring-2 focus:ring-blue-500 focus:outline-none transition-shadow" />
  </div>

  <div class="mb-3">
    <label class="block font-bold mb-1">Telefone</label>
    <input type="text" [(ngModel)]="novoCliente.telefone" (ngModelChange)="aplicarMascaraTelefone($event)" placeholder="(00) 00000-0000" 
           inputmode="numeric" maxlength="15"
           class="w-full p-2 border border-gray-300 rounded box-border focus:ring-2 focus:ring-blue-500 focus:outline-none transition-shadow" />
  </div>

  <div class="flex gap-4 mb-3">
    <div class="flex-1">
      <div class="mb-3">
        <label class="block font-bold mb-1">CEP</label>
        <input
          type="text"
          [(ngModel)]="novoCliente.cep"
          (ngModelChange)="aplicarMascaraCep($event)"
          placeholder="00000-000"
          maxlength="9"
          inputmode="numeric"
          class="w-full p-2 border border-gray-300 rounded box-border focus:ring-2 focus:ring-blue-500 focus:outline-none transition-shadow"
        />
      </div>
    </div>
    <div class="flex-1">
      <div class="mb-3">
        <label class="block font-bold mb-1 opacity-0 pointer-events-none">&nbsp;</label>
        <button
          type="button"
          class="w-full px-3.5 py-2 border-none cursor-pointer rounded bg-gray-500 hover:bg-gray-600 text-white transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
          (click)="buscarEndereco()"
          [disabled]="buscandoEndereco()"
        >
          {{ buscandoEndereco() ? 'Buscando...' : 'Buscar Endereco' }}
        </button>
      </div>
    </div>
  </div>

  @if (mensagemCep()) {
    <p class="mb-3 text-sm text-gray-700">{{ mensagemCep() }}</p>
  }

  <div class="mb-3">
    <label class="block font-bold mb-1">Endereço</label>
    <input
      type="text"
      [(ngModel)]="novoCliente.endereco"
      placeholder="Endereco sera preenchido apos buscar CEP"
      [disabled]="true"
      class="w-full p-2 border border-gray-300 rounded box-border bg-gray-100 text-gray-700 cursor-not-allowed"
    />
  </div>

  <div class="flex gap-4 mb-3">
    <div class="flex-1">
      <label class="block font-bold mb-1">Numero</label>
      <input
        type="text"
        [(ngModel)]="novoCliente.numero"
        placeholder="Ex: 123"
        inputmode="numeric"
        class="w-full p-2 border border-gray-300 rounded box-border focus:ring-2 focus:ring-blue-500 focus:outline-none transition-shadow"
      />
    </div>

    <div class="flex-1">
      <label class="block font-bold mb-1">Complemento</label>
      <input
        type="text"
        [(ngModel)]="novoCliente.complemento"
        placeholder="Apto, bloco, referencia..."
        class="w-full p-2 border border-gray-300 rounded box-border focus:ring-2 focus:ring-blue-500 focus:outline-none transition-shadow"
      />
    </div>
  </div>

  <div class="mb-3 mt-4">
    <button class="px-3.5 py-2 mr-1.5 border-none cursor-pointer rounded bg-blue-600 hover:bg-blue-700 text-white transition-colors" (click)="salvar()">{{ cliente() ? 'Atualizar' : 'Salvar' }}</button>
    <button class="px-3.5 py-2 mr-1.5 border-none cursor-pointer rounded bg-gray-500 hover:bg-gray-600 text-white transition-colors" (click)="cancelar()">Cancelar</button>
  </div>

  @if (mensagemFormulario()) {
    <p
      class="mb-3 text-sm"
      [class.text-green-700]="tipoMensagemFormulario() === 'sucesso'"
      [class.text-red-700]="tipoMensagemFormulario() === 'erro'"
    >
      {{ mensagemFormulario() }}
    </p>
  }
</section>
